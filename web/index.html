<body>
  <header class="site-header">
    <div class="brand">
      <h1>AniRatter</h1>
      <p class="tagline" id="meta-tagline">Loading…</p>
    </div>
    <div class="meta-stats" id="meta-stats"></div>
  </header>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="ANIME" role="tab">Anime <span class="tab-count" id="count-anime"></span></button>
    <button class="tab" data-tab="MANGA" role="tab">Manga <span class="tab-count" id="count-manga"></span></button>
  </div>

  <section class="controls">
    <label class="control">
      <span>Sort</span>
      <select id="sort-by">
        <option value="rec_score">Recommendation</option>
        <option value="predicted_score">Predicted score</option>
        <option value="mean_score">AniList mean</option>
        <option value="year">Year</option>
      </select>
    </label>

    <label class="control">
      <span>Format</span>
      <select id="filter-format">
        <option value="">All formats</option>
      </select>
    </label>

    <label class="control range-control">
      <span>Year</span>
      <input type="number" id="year-min" placeholder="from" />
      <input type="number" id="year-max" placeholder="to" />
    </label>

    <label class="control grow">
      <span>Search</span>
      <input type="search" id="search" placeholder="title contains…" />
    </label>
  </section>

  <section class="genre-filter">
    <span class="genre-label">Genres:</span>
    <div class="genre-chips" id="genre-chips"></div>
    <button class="genre-clear" id="genre-clear" type="button">clear</button>
  </section>

  <main id="grid" class="card-grid"></main>

  <footer class="site-footer">
    <p>Click a card to open it on AniList.</p>
  </footer>

  <script src="app.js"></script>
</body>
